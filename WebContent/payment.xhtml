<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1" />
	<title>Payment</title>
</h:head>
<h:body>
	<h1>CRUD - Payment</h1>


	<h:form id="form1">
		<p:panel header="Search">
			<p:panelGrid columns="3">
		    ID:
		    <p:inputText value="#{paymentBean.idSearch}" />
				<p:commandButton value="Search" action="#{paymentBean.searchId}"
					update="form1" />

			</p:panelGrid>
		</p:panel>
		<br />
		<p:panel header="Infos Payments">
			<p:panelGrid columns="2">
	   
		    ID:
		    <p:outputLabel value="#{paymentBean.payment.id}" />
	
	        DATE:
		    <p:inputText value="#{paymentBean.payment.date}" />

			PAYMENT TYPE:
		    <p:inputText value="#{paymentBean.payment.paymentType}" />
		    
			</p:panelGrid>

			<br />
			<p:commandButton value="Create" action="#{paymentBean.insert}"
				update="form1,data1" />

			<p:commandButton value="Update" action="#{paymentBean.update}"
				update="form1,data1" />

			<p:commandButton value="Delete" action="#{paymentBean.delete}"
				update="form1,data1" />

			<p:commandButton value="New" action="#{paymentBean.newPayment}"
				update="form1" />

			<p:messages />
		</p:panel>
	</h:form>

	<br />

	<p:panel id="panel1" header="List All Payments">

		<p:dataTable id="data1" var="pay" value="#{paymentBean.payments}">
			<p:column headerText="ID">
				<h:outputText value="#{pay.id}" />
			</p:column>

			<p:column headerText="DATE">
				<h:outputText value="#{pay.date}" />
			</p:column>
			
			<p:column headerText="PAYMENT TYPE">
				<h:outputText value="#{pay.paymentType}" />
			</p:column>
		</p:dataTable>

	</p:panel>


</h:body>
</html>
