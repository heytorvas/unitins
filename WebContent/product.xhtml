<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1" />
	<title>Product</title>
</h:head>
<h:body>
	<h1>CRUD - Product</h1>


	<h:form id="form1">
		<p:panel header="Search">
			<p:panelGrid columns="3">
		    ID:
		    <p:inputText value="#{productBean.idSearch}" />
				<p:commandButton value="Search" action="#{productBean.searchId}"
					update="form1" />

			</p:panelGrid>
		</p:panel>
		<br />
		<p:panel header="Infos Products">
			<p:panelGrid columns="2">
	   
		    ID:
		    <p:outputLabel value="#{productBean.product.id}" />
	
	        NAME:
		    <p:inputText value="#{productBean.product.nameProduct}" />

			PRICE:
		    <p:inputText value="#{productBean.product.price}" />
		    
			</p:panelGrid>

			<br />
			<p:commandButton value="Create" action="#{productBean.insert}"
				update="form1,data1" />

			<p:commandButton value="Update" action="#{productBean.update}"
				update="form1,data1" />

			<p:commandButton value="Delete" action="#{productBean.delete}"
				update="form1,data1" />

			<p:commandButton value="New" action="#{productBean.newProduct}"
				update="form1" />

			<p:messages />
		</p:panel>
	</h:form>

	<br />

	<p:panel id="panel1" header="List All Products">

		<p:dataTable id="data1" var="p" value="#{productBean.products}">
			<p:column headerText="ID">
				<h:outputText value="#{p.id}" />
			</p:column>

			<p:column headerText="NAME">
				<h:outputText value="#{p.nameProduct}" />
			</p:column>
			
			<p:column headerText="PRICE">
				<h:outputText value="#{p.price}" />
			</p:column>
		</p:dataTable>

	</p:panel>

</h:body>
</html>
